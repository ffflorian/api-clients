pre-commit:
  parallel: false
  commands:
    prettier:
      glob: '*.{js,ts,css,md,json,yml,yaml}'
      exclude:
        - CLAUDE.md
      run: yarn prettier --write {staged_files} && git add {staged_files}
    oxlint:
      glob: '*.{js,ts}'
      run: yarn oxlint --ignore-path .gitignore --fix {staged_files} && git add {staged_files}
    eslint:
      glob: '*.{js,ts}'
      run: yarn eslint --fix {staged_files} && git add {staged_files}
