version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    commit-message:
      prefix: 'fix(deps)'
      prefix-development: 'chore(deps-dev)'
    schedule:
      interval: weekly
    open-pull-requests-limit: 99
    assignees:
      - ffflorian
    versioning-strategy: increase
    ignore:
      - dependency-name: '@types/node'
        versions:
          - '> 26'
    groups:
      oxlint:
        patterns:
          - 'oxlint'
          - 'eslint-plugin-oxlint'
    cooldown:
      default-days: 5
      exclude:
        - '@ffflorian/*'
  - package-ecosystem: 'github-actions'
    directory: '/'
    commit-message:
      prefix: 'ci(deps)'
    schedule:
      interval: weekly
    open-pull-requests-limit: 99
    assignees:
      - ffflorian
    cooldown:
      default-days: 5
      exclude:
        - 'ffflorian/*'
