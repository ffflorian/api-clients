name: Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  build_test_publish:
    permissions:
      contents: write
      id-token: write
    name: Build, test, and publish
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26
          cache: yarn

      - name: Install packages
        run: |
          yarn --immutable

      - name: Lint, build, and test
        run: |
          yarn build
          yarn lint
          yarn test

      - name: Rebuild docs
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./bin/setup-ci-git-author.sh
          ./bin/rebuild-docs.sh

      - name: Publish on npm
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./bin/setup-ci-git-author.sh
          yarn release 2>&1 | tee /tmp/release.log

      - name: Upload release log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-log
          path: /tmp/release.log

  force-release:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: ffflorian/actions/force-release@b479e690751ea7150a7efa6f48afb0b735800d46
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          git_authorship: 'Florian Imdahl <git@ffflorian.de>'
          run_command: 'yarn --immutable && yarn release'
