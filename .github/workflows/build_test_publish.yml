name: Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  build_test_publish:
    permissions:
      contents: write
      id-token: write
    name: Build, test, and publish
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 26
          cache: yarn

      - name: Install packages
        run: |
          yarn --immutable

      - name: Lint, build, and test
        run: |
          yarn build
          yarn lint
          yarn test

      - name: Rebuild docs
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./bin/setup-ci-git-author.sh
          ./bin/rebuild-docs.sh

      - name: Publish on npm
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./bin/setup-ci-git-author.sh
          yarn release 2>&1 | tee /tmp/release.log

      - name: Upload release log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-log
          path: /tmp/release.log

  force-release:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: ffflorian/actions/force-release@0306941fc8c1a71a8bdaa1a2253e37f6ae707c6d
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          git_authorship: 'Florian Imdahl <git@ffflorian.de>'
          run_command: 'yarn --immutable && yarn release'
